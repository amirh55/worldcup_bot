{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:520px;">
    <h2>افزودن بازی جدید</h2>
    <form method="post">
        <label>تیم اول (مثلا: ایران)</label>
        <input type="text" name="team1" required>
        <label>تیم دوم (مثلا: اوکراین)</label>
        <input type="text" name="team2" required>
        <label>زمان شروع پاسخ‌دهی</label>
        <input type="datetime-local" name="start_time" required>
        <label>زمان پایان پاسخ‌دهی (معمولا لحظه شروع بازی)</label>
        <input type="datetime-local" name="close_time" required>
        <button type="submit" class="btn btn-green">ذخیره بازی</button>
        <a href="{{ url_for('matches') }}" class="btn btn-gray">انصراف</a>
    </form>
</div>
{% endblock %}
