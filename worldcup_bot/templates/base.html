<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت جام جهانی</title>
    <style>
        * { box-sizing: border-box; font-family: Tahoma, sans-serif; }
        body { margin: 0; background: #f0f2f5; color: #222; }
        .navbar { background: #1a73e8; color: #fff; padding: 14px 20px;
                  display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
        .navbar a { color: #fff; text-decoration: none; font-size: 15px; }
        .navbar a:hover { text-decoration: underline; }
        .navbar .brand { font-weight: bold; font-size: 18px; margin-left: auto; }
        .container { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
        .card { background: #fff; border-radius: 10px; padding: 20px;
                box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 20px; }
        h1, h2 { margin-top: 0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #f7f7f7; }
        .btn { display: inline-block; padding: 8px 14px; border-radius: 6px;
               border: none; cursor: pointer; font-size: 14px; text-decoration: none; }
        .btn-blue { background: #1a73e8; color: #fff; }
        .btn-green { background: #1e8e3e; color: #fff; }
        .btn-red { background: #d93025; color: #fff; }
        .btn-gray { background: #ddd; color: #333; }
        input[type=text], input[type=password], input[type=datetime-local], textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 6px; margin: 6px 0 14px; font-size: 14px; }
        label { font-weight: bold; font-size: 14px; }
        .flash { padding: 12px; border-radius: 6px; margin-bottom: 14px; }
        .flash.ok { background: #e6f4ea; color: #1e8e3e; }
        .flash.error { background: #fce8e6; color: #d93025; }
        .badge { padding: 3px 8px; border-radius: 10px; font-size: 12px; }
        .b-active { background: #e6f4ea; color: #1e8e3e; }
        .b-wait { background: #fff3cd; color: #946c00; }
        .b-done { background: #eee; color: #666; }
        .b-closed { background: #fce8e6; color: #d93025; }
    </style>
</head>
<body>
    {% if session.logged_in %}
    <div class="navbar">
        <a href="{{ url_for('matches') }}">🏆 بازی‌ها</a>
        <a href="{{ url_for('add_match') }}">➕ افزودن بازی</a>
        <a href="{{ url_for('users') }}">👥 کاربران و رتبه‌بندی</a>
        <a href="{{ url_for('settings') }}">⚙️ قوانین</a>
        <a href="{{ url_for('logout') }}">🚪 خروج</a>
        <span class="brand">پنل جام جهانی ۲۰۲۶</span>
    </div>
    {% endif %}
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, msg in messages %}
                <div class="flash {{ category }}">{{ msg }}</div>
            {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
