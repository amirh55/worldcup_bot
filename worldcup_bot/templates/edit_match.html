{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:520px;">
    <h2>ویرایش بازی</h2>
    <form method="post">
        <label>تیم اول</label>
        <input type="text" name="team1" value="{{ match.team1 }}" required>
        <label>تیم دوم</label>
        <input type="text" name="team2" value="{{ match.team2 }}" required>
        <label>زمان شروع پاسخ‌دهی</label>
        <input type="datetime-local" name="start_time"
               value="{{ match.start_time.replace(' ', 'T') }}" required>
        <label>زمان پایان پاسخ‌دهی</label>
        <input type="datetime-local" name="close_time"
               value="{{ match.close_time.replace(' ', 'T') }}" required>
        <button type="submit" class="btn btn-blue">ذخیره تغییرات</button>
        <a href="{{ url_for('matches') }}" class="btn btn-gray">انصراف</a>
    </form>
</div>
{% endblock %}
